[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src", "packages/sr_transcription", "packages/sr_snippet", "packages/sr_title", "packages/openrouter_transport"]

[project]
name = "silence-remover"
version = "0.1.0"
description = "Video silence detection tool using FFMPEG"
requires-python = ">=3.11"
dependencies = [
    "openrouter",
    "python-dotenv",
    "pillow",
    "arabic-reshaper",
    "python-bidi",
    "fastapi",
    "uvicorn",
]
