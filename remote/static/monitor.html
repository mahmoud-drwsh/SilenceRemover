<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Security Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #00d4aa;
    }
    .status {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 15px;
      min-width: 140px;
      flex: 1;
    }
    .card h3 {
      font-size: 12px;
      color: #8892b0;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card .number {
      font-size: 32px;
      font-weight: bold;
      color: #00d4aa;
    }
    .card .number.danger {
      color: #ff6b6b;
    }
    .card .number.warning {
      color: #ffd93d;
    }
    .section {
      background: #16213e;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .section h2 {
      font-size: 16px;
      color: #00d4aa;
      margin-bottom: 12px;
    }
    .ip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ip-badge {
      background: #ff6b6b;
      color: #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-family: monospace;
    }
    .login-item {
      background: #0f3460;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .login-item .ip {
      color: #00d4aa;
      font-family: monospace;
    }
    .last-update {
      text-align: center;
      color: #8892b0;
      font-size: 12px;
      margin-top: 20px;
    }
    .error {
      background: #ff6b6b;
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .config {
      background: #16213e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .config input {
      width: 100%;
      padding: 10px;
      background: #0f3460;
      border: 1px solid #233554;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .config button {
      width: 100%;
      padding: 12px;
      background: #00d4aa;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>🔒 Server Security Monitor</h1>
  
  <div id="config" class="config">
    <h3 style="margin-bottom: 10px; color: #00d4aa;">Monitor URL</h3>
    <input type="text" id="urlInput" placeholder="https://your-server.com/TOKEN/project/monitor">
    <button onclick="startMonitoring()">Start Monitoring</button>
  </div>

  <div id="monitor" class="hidden">
    <div class="status">
      <div class="card">
        <h3>SSH Attacks (24h)</h3>
        <div class="number" id="sshFailed">-</div>
      </div>
      <div class="card">
        <h3>Blocked (24h)</h3>
        <div class="number" id="ufwBlocks">-</div>
      </div>
      <div class="card">
        <h3>Banned IPs</h3>
        <div class="number" id="bannedCount">-</div>
      </div>
      <div class="card">
        <h3>Your Logins</h3>
        <div class="number" id="successLogins">-</div>
      </div>
    </div>

    <div class="section">
      <h2>🚫 Banned Attacker IPs</h2>
      <div class="ip-list" id="bannedIps">
        <span style="color: #8892b0;">No banned IPs</span>
      </div>
    </div>

    <div class="section">
      <h2>✅ Your Recent SSH Logins</h2>
      <div id="loginHistory">
        <span style="color: #8892b0;">No recent logins</span>
      </div>
    </div>

    <div class="last-update">
      Last updated: <span id="lastUpdate">-</span>
    </div>
  </div>

  <div id="error" class="error hidden"></div>

  <script>
    let monitorUrl = '';
    let refreshInterval = null;

    // Check for saved URL in localStorage
    const savedUrl = localStorage.getItem('monitorUrl');
    if (savedUrl) {
      document.getElementById('urlInput').value = savedUrl;
      monitorUrl = savedUrl;
      showMonitor();
      fetchData();
      startAutoRefresh();
    }

    function startMonitoring() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        showError('Please enter a monitor URL');
        return;
      }
      
      monitorUrl = url;
      localStorage.setItem('monitorUrl', url);
      showMonitor();
      fetchData();
      startAutoRefresh();
    }

    function showMonitor() {
      document.getElementById('config').classList.add('hidden');
      document.getElementById('monitor').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').classList.remove('hidden');
    }

    function startAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(fetchData, 10000); // Refresh every 10 seconds
    }

    async function fetchData() {
      try {
        const response = await fetch(monitorUrl);
        if (!response.ok) throw new Error('Failed to fetch: ' + response.status);
        
        const data = await response.json();
        updateUI(data);
        document.getElementById('error').classList.add('hidden');
      } catch (err) {
        showError('Connection error: ' + err.message);
      }
    }

    function updateUI(data) {
      // Update attack stats
      const sshFailed = data.attacks?.ssh_failed_24h || 0;
      const ufwBlocks = data.attacks?.ufw_blocks_24h || 0;
      const bannedCount = data.attacks?.currently_banned_count || '0';
      const successLogins = data.access?.successful_ssh_24h || 0;

      document.getElementById('sshFailed').textContent = sshFailed;
      document.getElementById('sshFailed').className = 'number' + (sshFailed > 50 ? ' danger' : sshFailed > 20 ? ' warning' : '');
      
      document.getElementById('ufwBlocks').textContent = ufwBlocks;
      document.getElementById('bannedCount').textContent = bannedCount;
      document.getElementById('successLogins').textContent = successLogins;

      // Update banned IPs
      const bannedIps = data.attacks?.banned_ips || [];
      const ipContainer = document.getElementById('bannedIps');
      if (bannedIps.length > 0) {
        ipContainer.innerHTML = bannedIps.map(ip => `<span class="ip-badge">${ip}</span>`).join('');
      } else {
        ipContainer.innerHTML = '<span style="color: #8892b0;">No banned IPs</span>';
      }

      // Update login history
      const logins = data.access?.last_ssh_logins || [];
      const loginContainer = document.getElementById('loginHistory');
      if (logins.length > 0) {
        loginContainer.innerHTML = logins.map(login => `
          <div class="login-item">
            <span>${login.user} @ ${login.time}</span>
            <span class="ip">${login.ip}</span>
          </div>
        `).join('');
      } else {
        loginContainer.innerHTML = '<span style="color: #8892b0;">No recent logins</span>';
      }

      // Update timestamp
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
    }

    // Stop refresh on page hide to save battery
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (refreshInterval) clearInterval(refreshInterval);
      } else if (monitorUrl) {
        fetchData();
        startAutoRefresh();
      }
    });
  </script>
</body>
</html>
