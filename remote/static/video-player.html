<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .player-shell {
            width: min(100%, 1200px);
            max-height: calc(100vh - 3rem);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: #242424;
            padding: 1rem;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        }

        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .player-title {
            font-size: 0.95rem;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .close-button {
            border: none;
            background: #ff4444;
            color: #fff;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .player-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: calc(100vh - 11rem);
            display: block;
            background: #000;
        }

        .error {
            text-align: center;
            color: #ff8888;
            padding: 2rem;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 0.8rem;
            }

            .player-shell {
                padding: 0.75rem;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="player-shell">
        <div class="player-header">
            <div class="player-title" id="video-title">Loading…</div>
            <button class="close-button" id="close-player">Close</button>
        </div>
        <div class="player-container" id="player-container"></div>
    </div>

    <script>
        const closePlayer = () => {
            if (window.opener && !window.opener.closed) {
                window.close();
                return;
            }
            window.history.back();
        };

        document.getElementById('close-player').addEventListener('click', closePlayer);

        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('file');
        const title = params.get('title') || 'Video Player';
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const token = pathParts[1] || '';
        const project = pathParts[2] || '';

        const videoTitle = document.getElementById('video-title');
        const playerContainer = document.getElementById('player-container');
        videoTitle.textContent = title;

        if (!fileId) {
            playerContainer.innerHTML = `<div class="error">Missing video id.</div>`;
            throw new Error('Missing file id');
        }

        const video = document.createElement('video');
        const streamUrl = `/projects/${encodeURIComponent(token)}/${encodeURIComponent(project)}/stream/${encodeURIComponent(fileId)}?type=video`;
        const source = document.createElement('source');
        source.src = streamUrl;
        video.controls = true;
        video.preload = 'metadata';
        video.playsInline = true;
        video.appendChild(source);
        playerContainer.appendChild(video);

        video.addEventListener('error', () => {
            playerContainer.innerHTML = `
                <div class="error">
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;">⚠️</div>
                    <div>Unable to play this video.</div>
                </div>
            `;
        });
    </script>
</body>
</html>
